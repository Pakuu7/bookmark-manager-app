<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Frontend Mentor | Bookmark manager app</title>
    <link rel="stylesheet" href="src/style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-100 relative">
<header class="header bg-neutral-0 px-4 py-3 border border-neutral-300">
    <div class="flex justify-between items-center">
        <button class="open-hamburger-btn p-2 border border-neutral-400 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20">
                <path stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"
                      d="M2.5 10h15m-15-5h15m-15 10h15"/>
            </svg>
        </button>
        <div class="search flex items-center px-3 py-2 border border-neutral-300 rounded-lg space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20">
                <path stroke="#001F1F" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"
                      d="m17.5 17.5-3.625-3.625m1.958-4.708a6.667 6.667 0 1 1-13.333 0 6.667 6.667 0 0 1 13.333 0"/>
            </svg>
            <input type="text" class="text-preset-4-medium" placeholder="Search by title...">
        </div>
        <button class="add flex justify-center items-center p-2 bg-teal-700 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20">
                <path stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"
                      d="M10 4.167v11.666M4.167 10h11.667"/>
            </svg>
        </button>
        <div class="profile">
            <img src="/image-avatar.webp" class="w-10" alt="profile-picture">
        </div>
    </div>
</header>
<main class="px-4 py-6">
    <div class="relative main-header flex justify-between items-center pb-5">
        <div>
            <h2 class="text-preset-2">All bookmarks</h2>
        </div>
        <button class="sort-menu-btn flex items-center px-3 py-2 rounded-lg space-x-1 border border-neutral-400 bg-neutral-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20">
                <path stroke="#001F1F" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"
                      d="M14.167 3.333v13.334m0 0-3.334-3.334m3.334 3.334 3.333-3.334M5.833 16.667V3.333m0 0L2.5 6.667m3.333-3.334 3.334 3.334"/>
            </svg>
            <p class="text-preset-3 px-0.5">Sort by</p>
        </button>
        <div class="hidden sort-menu absolute top-full -mt-3 right-0 bg-neutral-0 p-2 border border-neutral-100 rounded-lg w-50">
            <ul class="space-y-1 text-left">
                <li role="none">
                    <button role="option" aria-selected="true" class="recently-added flex items-center justify-between w-full p-2 text-preset-4 text-left rounded-md cursor-pointer">
                        <span>Recently added</span>
                        <img src="/icon-check.svg" alt="" aria-hidden="true" class="w-4 h-4">
                    </button>
                </li>
                <li role="none">
                    <button role="option" aria-selected="false" class="recently-visited flex items-center justify-between w-full p-2 text-preset-4 text-left rounded-md cursor-pointer">
                        <span>Recently visited</span>
                    </button>
                </li>
                <li role="none">
                    <button role="option" aria-selected="false" class="most-visited flex items-center justify-between w-full p-2 text-preset-4 text-left rounded-md cursor-pointer">
                        <span>Most visited</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>
    <div class="cards space-y-8"></div>
</main>
<div class="hidden hamburger-menu fixed inset-0 z-50">
    <div class="absolute inset-0 bg-neutral-900/40 backdrop-blur-xs"></div>
    <div class="absolute top-0 left-0 h-full header-menu bg-neutral-0 w-4/5 space-y-4">
        <div class="top relative p-5 pb-2.5">
            <img src="/logo-light-theme.svg">
            <img src="/icon-close.svg" class="close-hamburger-btn absolute top-5 right-5" alt="">
        </div>
        <div class="main px-4 pb-5 space-y-4">
            <div class="pages">
                <button class="flex items-center text-preset-3 text-neutral-800 px-3 py-2 bg-neutral-100 rounded-md w-full cursor-pointer">
                    <img src="/icon-home.svg" alt="" class="pr-2">Home
                </button>
                <button class="flex items-center text-preset-3 text-neutral-800 px-3 py-2 w-full cursor-pointer">
                    <img src="/icon-archive.svg" alt="" class="pr-2">Archived
                </button>
            </div>
            <div>
                <h2 class="font-bold text-xs px-3 pb-1">TAGS</h2>
                <div class="tags space-y-0.5">
                    <div class="tag flex items-center justify-between px-3 py-2">
                        <div class="flex items-center space-x-2">
                            <input type="checkbox">
                            <p class="text-preset-3 text-neutral-800">Ai</p>
                        </div>
                        <div class="bg-neutral-100 px-2 py-0.5 font-bold text-xs border border-neutral-300 rounded-full">
                            <span class="text-neutral-800">1</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="add-bookmark fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/50 hidden">
    <div class="w-full bg-neutral-0 rounded-2xl p-8 m-4 space-y-8">
        <div class="top relative">
            <div class="space-y-2">
                <h2 class="text-preset-2">Add a bookmark</h2>
                <p class="text-preset-5">Save a link with details to keep your collection organized. We extract the
                    favicon automatically from the URL.</p>
            </div>
            <button class="absolute bookmarkClose -top-2 right-0 p-1.5 border border-neutral-400 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20">
                    <path stroke="#001414" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"
                          d="M15 5 5 15M5 5l10 10"/>
                </svg>
            </button>
        </div>
        <div class="bottom">
            <form class="space-y-5">
                <div class="flex flex-col space-y-1.5">
                    <label for="title" class="text-preset-4-medium text-neutral-900">Title <span
                            class="text-teal-700">*</span></label>
                    <input type="text" id="title" name="title"
                           class="title-input text-preset-4-medium p-2 border border-neutral-500 rounded-lg">
                </div>
                <div class="flex flex-col space-y-1.5">
                    <label for="description" class="text-preset-4-medium text-neutral-900">Description <span
                            class="text-teal-700">*</span></label>
                    <textarea class="description-input text-preset-4-medium p-2 border border-neutral-500 rounded-lg"
                              id="description"
                              name="description" rows="3"></textarea>
                    <div class="text-preset-5 text-right">0/280</div>
                </div>
                <div class="flex flex-col space-y-1.5">
                    <label for="website" class="text-preset-4-medium text-neutral-900">Website URL <span
                            class="text-teal-700">*</span></label>
                    <input type="url" id="website" name="website"
                           class="website-input text-preset-4-medium p-2 border border-neutral-500 rounded-lg">
                </div>
                <div class="flex flex-col space-y-1.5">
                    <label for="tags" class="text-preset-4-medium text-neutral-900">Tags <span
                            class="text-teal-700">*</span></label>
                    <input type="text" id="tags" name="tags" placeholder="e.g. Design, Learning, Tools"
                           class="tags-input text-preset-4-medium p-2 border border-neutral-500 rounded-lg">
                </div>
            </form>
            <div class="text-right space-x-4 mt-8">
                <button class="text-preset-3 border border-neutral-400 rounded-lg px-4 py-3">Cancel</button>
                <button class="addBookmarkBtn text-preset-3 bg-teal-700 text-neutral-0 border border-neutral-400 rounded-lg px-4 py-3">
                    Add Bookmark
                </button>
            </div>
        </div>
    </div>
</div>
</body>
<script type="module" src="src/ts/index.ts"></script>
</html>
